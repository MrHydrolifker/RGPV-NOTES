<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Branch & Semester Selection</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body>
  <section id="selection">
    <h2>Select Your Branch</h2>
    <div id="branches">
      <button onclick="selectBranch('CSE')">CSE</button>
      <button onclick="selectBranch('AIML')">AIML</button>
      <button onclick="selectBranch('CSE-IoT')">CSE-IoT</button>
      <button onclick="selectBranch('AIDS')">AIDS</button>
      <button onclick="selectBranch('CSEDS')">CSEDS</button>
      <button onclick="selectBranch('MECHANICAL')">MECHANICAL</button>
      <button onclick="selectBranch('CIVIL')">CIVIL</button>
      <button onclick="selectBranch('EC')">EC</button>
      <button onclick="selectBranch('EX/EE')">EX/EE</button>
    </div>

    <h2>Select Your Semester</h2>
    <div id="semesters"></div>

    <h3>Subjects</h3>
    <div id="subjects"></div>
  </section>

  <section id="chapters" style="display: none;">
    <h2>Chapters</h2>
    <div id="chapter-list"></div>
  </section>

  <script>
    let selectedBranch = "";
    let selectedSemester = 0;

    const subjectImages = {
      "Engn. Physics": "jpgimagessubjects/physicss.jpeg",
      "Mathematics-1": "jpgimagessubjects/maths.jpg",
      "Language Labs": "jpgimagessubjects/lls.jpg",
      "Basic Civil Eng.": "jpgimagessubjects/civil.jpg",
      "Basic Mech.": "jpgimagessubjects/mechan.jpg",
      "Basic Computer Eng.": "jpgimagessubjects/computer.jpg",
      "Engineering Chemistry": "jpgimagessubjects/chem.jpg",
      "BEEE": "jpgimagessubjects/beeee.jpg",
      "English for Comm.": "jpgimagessubjects/englishforcommn.jpg",
      "EG": "jpgimagessubjects/enggrphic.jpg",
      "M1": "jpgimagessubjects/maths.jpg",
      "M2":"jpgimagessubjects/m2.jpg"
    };

    const subjectColors = {
      "Engn. Physics": "#FFDDC1",
      "Mathematics-1": "#C1E1FF",
      "Language Labs": "#D4E157",
      "Basic Civil Eng.": "#FFAB91",
      "Basic Mech.": "#F48FB1",
      "Basic Computer Eng.": "#80CBC4",
      "Engineering Chemistry": "#FFD700",
      "BEEE": "#FF7043",
      "English for Comm.": "#81C784",
      "EG": "#7986CB",
      "M1": "#A1887F"
    };

    function selectBranch(branch) {
      selectedBranch = branch;
      let semestersDiv = document.getElementById("semesters");
      semestersDiv.innerHTML = "";
      for (let i = 1; i <= 8; i++) {
        let btn = document.createElement("button");
        btn.innerText = "Semester " + i;
        btn.onclick = function() { selectSemester(i); };
        semestersDiv.appendChild(btn);
      }
    }

    function selectSemester(semester) {
      selectedSemester = semester;
      let subjectsDiv = document.getElementById("subjects");
      subjectsDiv.innerHTML = "";
      
      let subjects = [];

if (["AIML", "AIDS", "MECHANICAL", "CIVIL", "CSE-IoT", "CSEDS"].includes(selectedBranch) && semester == 1) {
  subjects = ["Engn. Physics", "M1", "Language Labs", "Basic Civil Eng.", "Basic Mech.", "Basic Computer Eng."];
} 
else if (["AIML", "AIDS", "MECHANICAL", "CIVIL", "CSE-IoT", "CSEDS"].includes(selectedBranch) && semester == 2) {
  subjects = ["Engineering Chemistry", "BEEE", "English for Comm.", "EG", "M2"];
}
else if (["CSE", "EC", "EX/EE"].includes(selectedBranch) && semester == 2) {
  subjects = ["Engn. Physics", "M2", "Language Labs", "Basic Civil Eng.", "Basic Mech.", "Basic Computer Eng."];
}
else if (["CSE", "EC", "EX/EE"].includes(selectedBranch) && semester == 1) {
  subjects = ["Engineering Chemistry", "BEEE", "English for Comm.", "EG", "M1"];
}

      let gridContainer = document.createElement("div");
      gridContainer.className = "subject-grid";
      
      subjects.forEach(subject => {
        let card = document.createElement("div");
        card.className = "subject-card";
        card.style.backgroundColor = subjectColors[subject] || "#ffffff";
        
        let image = document.createElement("img");
        image.src = subjectImages[subject] || "https://via.placeholder.com/300x150?text=Subject";
        image.alt = subject;
        image.style.width = "100%";
        
        let title = document.createElement("h3");
        title.innerText = subject;
        
        let btn = document.createElement("button");
        btn.innerText = "View Chapters";
        btn.onclick = function() { showChapters(subject); };
        
        card.appendChild(image);
        card.appendChild(title);
        card.appendChild(btn);
        gridContainer.appendChild(card);
      });
      
      subjectsDiv.appendChild(gridContainer);
    }
   // Define chapters for different subjects
const subjectChapters = {
    "Engn. Physics": ["Kinematics", "Laws of Motion", "Work and Energy", "Rotational Motion", "Modern Physics"],
    "Mathematics-1": ["Calculus", "Linear Algebra", "Differential Equations", "Probability", "Vectors"],
    "Language Labs": ["Listening Skills", "Speaking Skills", "Writing Skills", "Reading Comprehension", "Public Speaking"],
    "Basic Civil Eng.": ["Introduction to Civil Eng.", "Surveying", "Building Materials", "Structural Engineering", "Environmental Engineering"],
    "Basic Mech.": ["Thermodynamics", "Fluid Mechanics", "Strength of Materials", "Machine Design", "Dynamics of Machines"],
    "Basic Computer Eng.": ["Introduction to Computing", "Data Structures", "Algorithms", "Operating Systems", "Networking"],
    "Engineering Chemistry": ["Water Analysis", "Boiler Problem", "Lubrication", "Polymers", "Corrosion and Equilibrium","Spectroscopy","Periodic properties"],
    "BEEE": ["Electrical Circuits", "Magnetic Circuits", "Transformers", "Motors", "Power Systems"],
    "English for Comm.": ["Grammar Basics", "Business Communication", "Report Writing", "Presentation Skills", "Interviews & Resumes"],
    "EG": ["Orthographic Projections", "Isometric Views", "Perspective Drawings", "CAD Basics", "Engineering Standards"],
    "M1": ["Limits & Continuity", "Derivatives", "Integration", "Matrices", "Complex Numbers"],
    "M2": ["Differential Equations", "Laplace Transforms", "Fourier Series", "Numerical Methods", "Vector Calculus"]
};

function showChapters(subject) {
    document.getElementById("selection").style.display = "none";
    document.getElementById("chapters").style.display = "block";
    let chapterList = document.getElementById("chapter-list");
    chapterList.innerHTML = "";

    // Get the chapters for the selected subject or use a default list
    let chapters = subjectChapters[subject] || ["Introduction", "Fundamentals", "Advanced Concepts", "Case Studies", "Applications"];
    let chapterColors = ["#FFDDC1", "#C1E1FF", "#D4E157", "#FFAB91", "#80CBC4"];

    chapters.forEach((chapter, index) => {
        let card = document.createElement("div");
        card.className = "chapter-card";
        card.style.backgroundColor = chapterColors[index % chapterColors.length];
        card.innerHTML = `
            <h3>${chapter}</h3>
            <p>Contents of ${chapter}</p>
            <button onclick="downloadNotes('${subject}', ${index})">Download Notes</button>
        `;
        chapterList.appendChild(card);
    });
}

        function downloadNotes(subject, chapterIndex) {
            let notesLinks = {
                "Basic Computer Eng.": [
                    "https://drive.google.com/file/d/1Y3RR2dsNirUQoDG-tZb0pa0GHi373-u-/view?usp=drivesdk",
                    "https://drive.google.com/file/d/1qyMf5ODz8CQ6fmeGh7EZ3VVT22EHJT8F/view?usp=drivesdk",
                    "https://drive.google.com/file/d/1qzXGiZSqQ3xTXeFRbv-1PmMAwzYhQXqL/view?usp=drivesdk ",
                    "https://drive.google.com/file/d/1rEobZHsAKikVijAuVHhaIPc39JdP_SzE/view?usp=drivesdk",
                    "https://drive.google.com/file/d/1rQimMtRNyfmxGZ493cz0Dq311qTKHfFH/view?usp=drivesdk"
                ],

                "Engineering Chemistry": [
                    "https://drive.google.com/file/d/1rXIuZs80fXBAB0OgeqfDqE4gBAW1DLsh/view?usp=drivesdk",
                    "https://drive.google.com/file/d/1rZa8m0di7QFHJkd3QTfsuGoLCV0Hl1vc/view?usp=drivesdk",
                    "https://drive.google.com/file/d/15geiYLzma0fMtk1-p6Un_crNs3uWnqMn/view?usp=drivesdk",
                    "https://drive.google.com/file/d/15fltxZd-iUdeeyRsfj4K6NJiQJCazSJa/view?usp=drivesdk",
                    "https://drive.google.com/file/d/15T_hmJjPWFi64meG8rT16YbvAOb1oLUr/view?usp=drivesdk",
                    "https://drive.google.com/file/d/15wUi2YOV8-oMEOdFRmBW5GNkX-Dcfl7Q/view?usp=drivesdk"
                ]
            };
            
            let link = notesLinks[subject] ? notesLinks[subject][chapterIndex] : "https://placeholder.com/default.pdf";
            window.open(link, "_blank");
        }
  </script>

  <style>
    button {
      padding: 10px 15px;
      margin: 5px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #2cbcff;
    }
    .subject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .subject-card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .subject-card:hover {
      transform: translateY(-5px);
      box-shadow: 4px 4px 15px rgba(0,0,0,0.2);
    }

    .chapter-card {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 10px;
            border-radius: 5px;
            background-color: #f9f9f9;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }
        .chapter-card:hover {
            transform: scale(1.05);
        }
        .chapter-card h3 {
            margin-bottom: 5px;
        }
        .chapter-card button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .chapter-card button:hover {
            background-color: #0056b3;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2cbcff;
        }
  </style>
</body>
</html>
