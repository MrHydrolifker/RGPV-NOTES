    function selectBranch(branch) {
      selectedBranch = branch;
      let semestersDiv = document.getElementById("semesters");
      semestersDiv.innerHTML = "";
      for (let i = 1; i <= 8; i++) {
        let btn = document.createElement("button");
        btn.innerText = "Semester " + i;
        btn.onclick = function() { selectSemester(i); };
        semestersDiv.appendChild(btn);
      }
    }

    function selectSemester(semester) {
      selectedSemester = semester;
      let subjectsDiv = document.getElementById("subjects");
      subjectsDiv.innerHTML = "";
      
      let subjects = [];

      if (selectedBranch === "AIML" && semester === 4) {
        subjects = ["ADA", "COA", "Machine Learning", "SOFTWARE ENGINEERING", "Discrete Mathematics"];
      }
      else if (["AIML", "AIDS", "MECHANICAL", "CIVIL", "CSE-IoT", "CSEDS"].includes(selectedBranch) && semester == 1) {
        subjects = ["Engn. Physics", "M1", "Language Labs", "Basic Civil Eng.", "Basic Mech.", "Basic Computer Eng."];
      } 
      else if (["AIML", "AIDS", "MECHANICAL", "CIVIL", "CSE-IoT", "CSEDS"].includes(selectedBranch) && semester == 2) {
        subjects = ["Engineering Chemistry", "BEEE", "English for Comm.", "EG", "M2"];
      }
      else if (["CSE", "EC", "EX/EE"].includes(selectedBranch) && semester == 2) {
        subjects = ["Engn. Physics", "M2", "Language Labs", "Basic Civil Eng.", "Basic Mech.", "Basic Computer Eng."];
      }
      else if (["CSE", "EC", "EX/EE"].includes(selectedBranch) && semester == 1) {
        subjects = ["Engineering Chemistry", "BEEE", "English for Comm.", "EG", "M1"];
      }

      let gridContainer = document.createElement("div");
      gridContainer.className = "subject-grid";
      
      subjects.forEach(subject => {
        let card = document.createElement("div");
        card.className = "subject-card";
        
        let image = document.createElement("img");
        image.src = subjectImages[subject] || "https://via.placeholder.com/300x150?text=Subject";
        image.alt = subject;
        image.style.width = "100%";
        
        let title = document.createElement("h3");
        title.innerText = subject;
        
        let btn = document.createElement("button");
        btn.innerText = "View Chapters";
        btn.onclick = function() { showChapters(subject); };
        
        card.appendChild(image);
        card.appendChild(title);
        card.appendChild(btn);
        gridContainer.appendChild(card);
      });
      
      subjectsDiv.appendChild(gridContainer);
    }
   // Define chapters for different subjects
const subjectChapters = {

    "BEEE": ["Electrical Circuits", "Magnetic Circuits", "Transformers", "Motors", "Power Systems"],

    "ADA": ["Algorithm Analysis", "Greedy Algorithm", "Dynamic Programming", "Backtracking", "Advanced Tree and Graph"],
    "SOFTWARE ENGINEERING": ["The Software Product and Software Process", "Requirement Elicitation, Analysis, and Specification", "Software Design", "Software Analysis and Testing", "Software Maintenance & Software Project Measurement"],

    "Machine Learning": ["INTRO ML", "Neural Networks", "Supervised Learning Techniques", "Unsupervised Learning Techniques", "ML Design and Analysis"],
    "COA": ["Basic Structure of Computer", "Computer Arithmetic", "I/O Organization: I/O Interface", "Memory Organization", "Multiprocessors"]
};

async function showChapters(subject) {
    document.getElementById("selection").style.display = "none";
    document.getElementById("chapters").style.display = "block";
    let chapterList = document.getElementById("chapter-list");
    chapterList.innerHTML = "<p>Loading notes...</p>";

    let chapters = subjectChapters[subject] || ["Introduction", "Fundamentals", "Advanced Concepts", "Case Studies", "Applications"];
    let chapterColors = ["#FFDDC1", "#C1E1FF", "#D4E157", "#FFAB91", "#80CBC4"];
    let uploadedNotes = await loadNotesForSubject(subject);

    chapterList.innerHTML = "";
    chapters.forEach((chapter, index) => {
        let card = document.createElement("div");
        card.className = "chapter-card";
        card.style.backgroundColor = chapterColors[index % chapterColors.length];
        const note = uploadedNotes[chapter] || null;
        card.innerHTML = `
            <h3>${chapter}</h3>
            <p>Contents of ${chapter}</p>
            ${note ? `<p><a href="${note.url}" target="_blank" rel="noopener">Open Uploaded PDF</a></p>` : `<p>No PDF uploaded yet.</p>`}
            <button onclick="downloadNotes('${subject}', '${chapter}')">Download Notes</button>
        `;
        chapterList.appendChild(card);
    });
}

async function loadNotesForSubject(subject) {
    const notesMap = {};
    try {
        const q = query(
            collection(db, "notes"),
            where("branch", "==", selectedBranch),
            where("semester", "==", selectedSemester),
            where("subject", "==", subject)
        );
        const snapshot = await getDocs(q);
        snapshot.forEach((doc) => {
            const data = doc.data();
            notesMap[data.chapterName] = { url: data.fileUrl, fileName: data.fileName };
        });
    } catch (error) {
        console.error("Failed to load notes from Firebase", error);
    }
    return notesMap;
}

        async function downloadNotes(subject, chapterName) {
            try {
                const q = query(
                    collection(db, "notes"),
                    where("branch", "==", selectedBranch),
                    where("semester", "==", selectedSemester),
                    where("subject", "==", subject),
                    where("chapterName", "==", chapterName)
                );
                const snapshot = await getDocs(q);
                if (!snapshot.empty) {
                    const note = snapshot.docs[0].data();
                    if (note.fileUrl) {
                        window.open(note.fileUrl, "_blank");
                        return;
                    }
                }
            } catch (error) {
                console.error("Failed to load uploaded note", error);
            }

            window.open("https://placeholder.com/default.pdf", "_blank");
        }
  </script>
